<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Code Review Assistant</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (CDNs) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel standalone for JSX parsing in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function IssueItem({ issue }) {
            let severityColor = "bg-gray-100 text-gray-800 border-gray-200";
            if (issue.severity?.toUpperCase() === 'HIGH') {
                severityColor = "bg-red-50 text-red-800 border-red-200";
            } else if (issue.severity?.toUpperCase() === 'MEDIUM') {
                severityColor = "bg-yellow-50 text-yellow-800 border-yellow-200";
            } else if (issue.severity?.toUpperCase() === 'LOW') {
                severityColor = "bg-blue-50 text-blue-800 border-blue-200";
            }

            return (
                <div className={`p-4 border rounded-lg ${severityColor} flex flex-col space-y-2 text-sm`}>
                <div className="flex justify-between items-start">
                    <span className="font-semibold">{issue.severity?.toUpperCase()} SEVERITY</span>
                    {issue.line && <span className="bg-white/60 px-2 py-0.5 rounded text-xs">Line {issue.line}</span>}
                </div>
                <p className="text-gray-900"><span className="font-medium">Issue:</span> {issue.issue}</p>
                {issue.explanation && <p className="text-gray-700 italic">{issue.explanation}</p>}
                {issue.fix && (
                    <div className="mt-2 bg-white/60 p-2 rounded border border-white/40">
                    <span className="font-medium block text-gray-900 mb-1">Suggested Fix:</span>
                    <code className="text-sm rounded break-words whitespace-pre-wrap font-mono">{issue.fix}</code>
                    </div>
                )}
                </div>
            )
        }

        function IssueSection({ title, issues }) {
            if (!issues || issues.length === 0) return null;
            return (
                <div>
                <h3 className="text-lg font-medium text-gray-800 border-b pb-2 mb-3">
                    {title} <span className="text-sm font-normal text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full">{issues.length}</span>
                </h3>
                <div className="space-y-3">
                    {issues.map((issue, idx) => <IssueItem key={idx} issue={issue} />)}
                </div>
                </div>
            )
        }

        function ReviewPanel({ results }) {
            const hasIssues = (results.bugs?.length > 0) || 
                                (results.security?.length > 0) || 
                                (results.performance?.length > 0) || 
                                (results.quality?.length > 0);

            return (
                <div className="flex flex-col space-y-6">
                <div className="border-b pb-4">
                    <h2 className="text-xl font-semibold text-gray-800">Review Summary</h2>
                    <p className="text-gray-600 mt-2">{results.summary}</p>
                </div>

                {!hasIssues ? (
                    <div className="text-green-600 font-medium">No issues found. Awesome work!</div>
                ) : (
                    <div className="space-y-6">
                        <IssueSection title="Bugs" issues={results.bugs} />
                        <IssueSection title="Security" issues={results.security} />
                        <IssueSection title="Performance" issues={results.performance} />
                        <IssueSection title="Quality" issues={results.quality} />
                    </div>
                )}
                </div>
            )
        }

        function CodeEditor({ code, setCode }) {
            return (
                <div className="flex-1 flex flex-col h-full min-h-[300px]">
                <div className="bg-gray-800 text-gray-200 px-4 py-2 text-sm font-mono border-b border-gray-700 flex justify-between items-center">
                    <span>Source Code</span>
                </div>
                <textarea
                    className="flex-1 w-full p-4 font-mono text-sm bg-gray-900 text-gray-100 outline-none resize-none"
                    placeholder="Paste your code here..."
                    value={code}
                    onChange={(e) => setCode(e.target.value)}
                    spellCheck="false"
                />
                </div>
            )
        }

        function App() {
            const [code, setCode] = useState('');
            const [results, setResults] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleReview = async () => {
                if (!code.trim()) return;
                setLoading(true);
                setError(null);
                try {
                // Pointing strictly to our local spring-boot backend
                const response = await axios.post('http://localhost:8080/api/review', { code });
                setResults(response.data);
                } catch (err) {
                setError(err.response?.data?.summary || 'An error occurred while fetching the review.');
                } finally {
                setLoading(false);
                }
            }

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                <h1 className="text-3xl font-bold text-gray-800 mb-6">LLM-Powered Code Review Assistant</h1>
                
                <div className="w-full max-w-7xl flex flex-col lg:flex-row gap-6 h-[80vh]">
                    <div className="w-full lg:w-1/2 flex flex-col bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                    <CodeEditor code={code} setCode={setCode} />
                    <div className="p-4 bg-gray-50 border-t flex justify-end">
                        <button
                            onClick={handleReview}
                            disabled={loading || !code.trim()}
                            className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-sm transition-colors disabled:opacity-50"
                        >
                        {loading ? 'Reviewing...' : 'Review Code'}
                        </button>
                    </div>
                    </div>

                    <div className="w-full lg:w-1/2 flex flex-col bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden p-6 space-y-4 overflow-y-auto">
                    {loading && <div className="text-gray-500 flex items-center justify-center h-full">Analyzing your code...</div>}
                    {error && <div className="text-red-600 bg-red-50 p-4 rounded-lg">{error}</div>}
                    {!loading && !error && results && <ReviewPanel results={results} />}
                    {!loading && !error && !results && <div className="text-gray-400 flex items-center justify-center h-full text-center">Paste code and click Review to see suggestions.</div>}
                    </div>
                </div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
